<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RHS Weekly 10 Plant Quiz</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #f0f4f8;
      --text: #1a202c;
      --muted: #64748b;
      --muted-2: #475569;
      --panel: #ffffff;
      --primary: #3b82f6;
      --secondary: #64748b;
      --border: #e2e8f0;
      --shadow: 0 10px 28px rgba(0,0,0,0.10);
      --radius: 18px;
      --mobile-controls-height: 92px;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 960px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 8px 0;
      text-align: center;
      font-size: 36px;
      line-height: 1.1;
    }

    .subhead {
      text-align: center;
      margin: 0 0 14px 0;
      color: var(--muted);
      font-size: 15px;
    }

    .counter {
      text-align: center;
      margin: 0 0 12px 0;
      color: var(--muted-2);
      font-size: 16px;
    }

    .top-controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .card-wrap {
      perspective: 1200px;
      margin-top: 20px;
      height: 500px;
    }

    .flashcard {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.7s ease;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: pan-y;
    }

    .flashcard.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      background: var(--panel);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      overflow: auto;
      display: flex;
      flex-direction: column;
    }

    .card-front {
      z-index: 2;
    }

    .card-back {
      transform: rotateY(180deg);
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .card-meta {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-bottom: 10px;
      gap: 12px;
    }

    .card-hint {
      font-size: 13px;
      color: var(--muted);
      text-align: right;
    }

    .images {
      display: grid;
      gap: 12px;
      justify-content: center;
      align-content: start;
      flex: 1;
    }

    .images.one {
      grid-template-columns: 1fr;
    }

    .images.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .images.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .images img {
      width: 100%;
      max-width: 100%;
      border-radius: 10px;
      object-fit: contain;
      background: #fff;
      display: block;
      border: 1px solid var(--border);
    }

    .images.one img {
      max-height: 360px;
    }

    .images.two img {
      max-height: 290px;
    }

    .images.three img {
      max-height: 220px;
    }

    button,
    .button-link {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      background: var(--primary);
      color: white;
      cursor: pointer;
      font-size: 16px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      line-height: 1.2;
      min-height: 44px;
    }

    button.secondary,
    .button-link.secondary {
      background: var(--secondary);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .study-controls {
      margin-top: 16px;
      display: flex;
      gap: 12px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }

    .study-controls .nav-btn {
      min-width: 112px;
    }

    .answer {
      font-size: 32px;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .common-name-display {
      margin-top: 14px;
      font-size: 20px;
      color: var(--muted);
    }

    .back-actions {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .extra-back-info {
    margin-top: 18px;
    font-size: 18px;
    line-height: 1.5;
    color: var(--muted-2);
    text-align: left;
    max-width: 760px;
    margin-left: auto;
    margin-right: auto;
  }
    
    .quiz-card,
    .results-card {
      background: var(--panel);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    .quiz-images,
    .result-images {
      display: grid;
      gap: 12px;
      justify-content: center;
      margin: 20px 0;
    }

    .quiz-images.one,
    .result-images.one {
      grid-template-columns: 1fr;
    }

    .quiz-images.two,
    .result-images.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .quiz-images.three,
    .result-images.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .quiz-images img,
    .result-images img {
      width: 100%;
      max-width: 100%;
      border-radius: 8px;
      object-fit: contain;
      background: #fff;
      display: block;
      border: 1px solid var(--border);
    }

    .quiz-images.one img {
      max-height: 320px;
    }

    .quiz-images.two img {
      max-height: 240px;
    }

    .quiz-images.three img {
      max-height: 190px;
    }

    .result-images.one img {
      max-height: 220px;
    }

    .result-images.two img,
    .result-images.three img {
      max-height: 140px;
    }

    .quiz-label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .quiz-input {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #cbd5e1;
      border-radius: 10px;
      font-size: 16px;
      font-family: inherit;
    }

    .quiz-progress-wrap {
      margin-bottom: 18px;
    }

    .quiz-progress-bar {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: var(--border);
      overflow: hidden;
    }

    .quiz-progress-fill {
      height: 100%;
      background: var(--primary);
      transition: width 0.25s ease;
    }

    .quiz-progress-text {
      margin-top: 8px;
      font-size: 14px;
      color: var(--muted);
      text-align: center;
    }

    .quiz-nav {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .results-score {
      font-size: 40px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
    }

    .results-sub {
      text-align: center;
      margin-bottom: 24px;
      color: var(--muted-2);
    }

    .result-item {
      border-top: 1px solid var(--border);
      padding: 18px 0;
    }

    .result-item:first-child {
      border-top: none;
      padding-top: 0;
    }

    .result-topline {
      margin-bottom: 10px;
    }

    .correct {
      color: #15803d;
      font-weight: 600;
    }

    .incorrect {
      color: #b91c1c;
      font-weight: 600;
    }

    .result-note {
      margin-top: 6px;
      color: var(--muted-2);
      font-size: 14px;
    }

    .result-links {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .empty-message {
      text-align: center;
      color: var(--muted);
    }

    em {
      font-style: italic;
    }

    .mobile-study-controls {
      display: none;
    }

    @media (max-width: 700px) {
      body {
        padding: 16px 16px calc(var(--mobile-controls-height) + env(safe-area-inset-bottom) + 20px) 16px;
      }

      .wrap {
        max-width: 100%;
      }

      h1 {
        font-size: 28px;
      }

      .counter {
        margin-bottom: 14px;
      }

      .top-controls {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-bottom: 14px;
      }

      .top-controls button {
        width: 100%;
        min-height: 44px;
        font-size: 14px;
        padding: 10px 8px;
      }

      .card-wrap {
        height: auto;
        min-height: 0;
        margin-top: 12px;
      }

      .flashcard,
      .flashcard.flipped {
        height: auto;
        min-height: 0;
        transform: none;
      }

      .card-face {
        position: relative;
        inset: auto;
        width: 100%;
        height: auto;
        min-height: 0;
      }

      .flashcard .card-front {
        display: flex;
      }

      .flashcard .card-back {
        display: none;
      }

      .flashcard.flipped .card-front {
        display: none;
      }

      .flashcard.flipped .card-back {
        display: flex;
      }

      .card-front,
      .card-back {
        transform: none;
        backface-visibility: visible;
      }

      .answer {
        font-size: 24px;
      }

      .common-name-display {
        font-size: 18px;
      }

      .extra-back-info {
      font-size: 16px;
      line-height: 1.45;
      }

      .quiz-nav,
      .back-actions,
      .result-links {
        flex-direction: column;
        align-items: stretch;
      }

      .quiz-nav button,
      .back-actions .button-link,
      .result-links .button-link {
        width: 100%;
      }

      .images.two,
      .images.three,
      .quiz-images.two,
      .quiz-images.three,
      .result-images.two,
      .result-images.three {
        grid-template-columns: 1fr;
      }

      .images.two img,
      .images.three img,
      .quiz-images.two img,
      .quiz-images.three img {
        max-height: 260px;
      }

      .quiz-input {
        font-size: 16px;
      }

      .results-score {
        font-size: 32px;
      }

      .card-meta {
        justify-content: flex-end;
        align-items: flex-start;
        margin-bottom: 10px;
      }

      .card-hint {
        text-align: right;
        font-size: 13px;
      }

      .study-controls {
        display: none;
      }

      .mobile-study-controls {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        display: grid;
        grid-template-columns: 1fr 1.2fr 1fr;
        gap: 10px;
        padding: 12px 16px calc(12px + env(safe-area-inset-bottom)) 16px;
        background: rgba(240,244,248,0.96);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-top: 1px solid var(--border);
        z-index: 1000;
      }

      .mobile-study-controls button {
        width: 100%;
        min-height: 52px;
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>RHS Weekly 10 Plant Quiz</h1>
    <p class="subhead">This week’s 10 plants</p>
    <p class="counter" id="counter"></p>

    <div class="top-controls">
      <button id="studyModeBtn" onclick="switchMode('study')">Study</button>
      <button class="secondary" id="quizModeBtn" onclick="startQuiz()">Quiz</button>
      <button class="secondary" onclick="shuffleStudyDeck()">Shuffle</button>
    </div>

    <div id="app"></div>
  </div>

  <div id="mobileStudyControls" class="mobile-study-controls" style="display:none;">
    <button class="secondary" id="mobilePrevBtn" onclick="prevCard()">Previous</button>
    <button id="mobileFlipBtn" onclick="toggleAnswer()">Flip Card</button>
    <button class="secondary" id="mobileNextBtn" onclick="nextCard()">Next</button>
  </div>

  <script src="cards.js"></script>
  <script>
    const builtInCards = Array.isArray(cards) ? cards.map(card => ({ ...card })) : [];
    let activeCards = builtInCards.map(card => ({ ...card }));

    let mode = "study";
    let currentIndex = 0;
    let showingAnswer = false;

    let quizCards = [];
    let quizAnswers = [];
    let currentQuizIndex = 0;
    let showingResults = false;

    let touchStartX = 0;
    let touchStartY = 0;
    let suppressCardClick = false;

    const QUIZ_SIZE = 10;
    const LAST_QUIZ_STORAGE_KEY = "weekly-10-last-quiz-ids";

    function shuffleArray(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function getCurrentCards() {
      return activeCards;
    }

    function getStoredLastQuizIds() {
      try {
        return JSON.parse(localStorage.getItem(LAST_QUIZ_STORAGE_KEY) || "[]");
      } catch {
        return [];
      }
    }

    function setStoredLastQuizIds(ids) {
      try {
        localStorage.setItem(LAST_QUIZ_STORAGE_KEY, JSON.stringify(ids));
      } catch {
      }
    }

    function getPlantPositionText() {
      const currentCards = getCurrentCards();
      if (!currentCards.length) return "No cards";
      return `Plant ${currentIndex + 1} of ${currentCards.length}`;
    }

    function getLatinName(backText) {
      return String(backText || "").split("\n")[0].trim();
    }

    function getCommonName(backText) {
      const match = String(backText || "").match(/\(([^)]+)\)/);
      return match ? match[1].trim() : "";
    }

    function getRhsUrl(card) {
      return card?.rhs_url ? String(card.rhs_url).trim() : "";
    }

    function formatLatinForDisplay(backText) {
      const latin = getLatinName(backText);
      return `<em>${escapeHtml(latin)}</em>`;
    }

    function formatCommonNameForDisplay(backText) {
      const common = getCommonName(backText);
      return common ? `(${escapeHtml(common)})` : "";
    }
    
function getExtraBackInfo(backText) {
  const parts = String(backText || "").split("\n\n");
  return parts.slice(2).join("\n\n").trim();
}
    
    function getImageArray(card) {
      return [
        card.front_image_url_1,
        card.front_image_url_2,
        card.front_image_url_3
      ].filter(Boolean);
    }

    function getImageClass(images) {
      if (images.length === 1) return "one";
      if (images.length === 2) return "two";
      return "three";
    }

    function updateMobileStudyControls() {
      const bar = document.getElementById("mobileStudyControls");
      const prevBtn = document.getElementById("mobilePrevBtn");
      const nextBtn = document.getElementById("mobileNextBtn");
      const flipBtn = document.getElementById("mobileFlipBtn");

      const showBar = mode === "study" && window.innerWidth <= 700;
      bar.style.display = showBar ? "grid" : "none";

      if (!showBar) return;

      const currentCards = getCurrentCards();
      prevBtn.disabled = currentIndex === 0;
      nextBtn.disabled = currentIndex === currentCards.length - 1;
      flipBtn.textContent = showingAnswer ? "Show Front" : "Flip Card";
    }

    function switchMode(newMode) {
      mode = newMode;
      showingResults = false;
      updateModeButtons();
      renderApp();
    }

    function updateModeButtons() {
      const studyBtn = document.getElementById("studyModeBtn");
      const quizBtn = document.getElementById("quizModeBtn");

      if (mode === "study") {
        studyBtn.classList.remove("secondary");
        quizBtn.classList.add("secondary");
      } else {
        quizBtn.classList.remove("secondary");
        studyBtn.classList.add("secondary");
      }
    }

    function renderStudyMode() {
      const currentCards = getCurrentCards();

      if (!currentCards.length) {
        document.getElementById("counter").textContent = "No cards";
        document.getElementById("app").innerHTML = `
          <div class="results-card">
            <p class="empty-message">No cards available in this deck.</p>
          </div>
        `;
        return;
      }

      if (currentIndex >= currentCards.length) currentIndex = 0;

      const card = currentCards[currentIndex];
      const images = getImageArray(card);
      const rhsUrl = getRhsUrl(card);

      document.getElementById("counter").textContent = getPlantPositionText();

      document.getElementById("app").innerHTML = `
        <div class="card-wrap">
          <div class="flashcard ${showingAnswer ? 'flipped' : ''}" id="flashcard">
            <div class="card-face card-front">
              <div class="card-meta">
                <div class="card-hint">Tap card or button to flip</div>
              </div>

              <div class="images ${getImageClass(images)}">
                ${images.map(url => `<img src="${escapeHtml(url)}" alt="Plant image" onerror="this.style.display='none'">`).join("")}
              </div>
            </div>

            <div class="card-face card-back">
  <div style="width: 100%;">
    <div class="answer">${formatLatinForDisplay(card.back_text)}</div>
    <div class="common-name-display">${formatCommonNameForDisplay(card.back_text)}</div>
    ${
      getExtraBackInfo(card.back_text)
        ? `<div class="extra-back-info">${escapeHtml(getExtraBackInfo(card.back_text)).replace(/\n/g, "<br>")}</div>`
        : ""
    }
    <div class="back-actions">
      ${rhsUrl ? `<a class="button-link secondary" href="${escapeHtml(rhsUrl)}" target="_blank" rel="noopener noreferrer">RHS plant page</a>` : ""}
    </div>
  </div>
</div>

        <div class="study-controls">
          <button class="nav-btn secondary" onclick="prevCard()" ${currentIndex === 0 ? "disabled" : ""}>Previous</button>
          <button class="nav-btn" onclick="toggleAnswer()">${showingAnswer ? "Show Front" : "Flip Card"}</button>
          <button class="nav-btn secondary" onclick="nextCard()" ${currentIndex === currentCards.length - 1 ? "disabled" : ""}>Next</button>
        </div>
      `;

      attachStudyCardInteractions();
    }

    function renderQuizMode() {
      if (showingResults) {
        renderResults();
        return;
      }

      const card = quizCards[currentQuizIndex];
      const images = getImageArray(card);
      const progressPercent = ((currentQuizIndex + 1) / quizCards.length) * 100;

      document.getElementById("counter").textContent = `Question ${currentQuizIndex + 1} of ${quizCards.length}`;

      document.getElementById("app").innerHTML = `
        <div class="quiz-card">
          <div class="quiz-progress-wrap">
            <div class="quiz-progress-bar">
              <div class="quiz-progress-fill" style="width:${progressPercent}%"></div>
            </div>
            <div class="quiz-progress-text">Answered ${currentQuizIndex + 1} of ${quizCards.length}</div>
          </div>

          <div class="quiz-images ${getImageClass(images)}">
            ${images.map(url => `<img src="${escapeHtml(url)}" alt="Plant image" onerror="this.style.display='none'">`).join("")}
          </div>

          <label class="quiz-label" for="quizAnswer">What is the full botanical name of this plant?</label>
          <input
            id="quizAnswer"
            class="quiz-input"
            type="text"
            value="${escapeHtml(quizAnswers[currentQuizIndex] || "")}"
            oninput="quizAnswers[${currentQuizIndex}] = this.value"
            placeholder="Enter full botanical name"
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
          >

          <div class="quiz-nav">
            <button class="secondary" onclick="prevQuizQuestion()" ${currentQuizIndex === 0 ? "disabled" : ""}>Previous</button>
            ${
              currentQuizIndex === quizCards.length - 1
                ? `<button onclick="submitQuiz()">Submit Quiz</button>`
                : `<button onclick="nextQuizQuestion()">Next</button>`
            }
          </div>
        </div>
      `;
    }

    function renderResults() {
      let score = 0;

      const resultsHtml = quizCards.map((card, index) => {
        const userAnswer = (quizAnswers[index] || "").trim();
        const latinName = getLatinName(card.back_text);
        const commonName = getCommonName(card.back_text);
        const rhsUrl = getRhsUrl(card);
        const result = checkQuizAnswer(userAnswer, card.back_text);
        const images = getImageArray(card);

        if (result.isCorrect) score++;

        return `
          <div class="result-item">
            <div class="result-topline ${result.isCorrect ? 'correct' : 'incorrect'}">
              ${result.isCorrect ? "Correct" : "Incorrect"}
            </div>

            <div class="result-images ${getImageClass(images)}">
              ${images.map(url => `<img src="${escapeHtml(url)}" alt="Plant image" onerror="this.style.display='none'">`).join("")}
            </div>

            <div><strong>Your answer:</strong> ${escapeHtml(userAnswer || "(blank)")}</div>
            <div><strong>Correct Latin name:</strong> <em>${escapeHtml(latinName)}</em></div>
            ${commonName ? `<div><strong>Common name:</strong> ${escapeHtml(commonName)}</div>` : ""}
            ${result.note ? `<div class="result-note"><em>${escapeHtml(result.note)}</em></div>` : ""}
            <div class="result-links">
              ${rhsUrl ? `<a class="button-link secondary" href="${escapeHtml(rhsUrl)}" target="_blank" rel="noopener noreferrer">RHS plant page</a>` : ""}
            </div>
          </div>
        `;
      }).join("");

      document.getElementById("counter").textContent = "Quiz complete";

      document.getElementById("app").innerHTML = `
        <div class="results-card">
          <div class="results-score">${score} / ${quizCards.length}</div>
          <div class="results-sub">Marks awarded for correctly spelled full botanical names only</div>
          ${resultsHtml}
          <div class="study-controls" style="margin-top:24px;">
            <button onclick="startQuiz()">New Quiz</button>
            <button class="secondary" onclick="switchMode('study')">Back to Study</button>
          </div>
        </div>
      `;
    }

    function normalize(text) {
      return String(text || "")
        .toLowerCase()
        .replace(/[^\w\s×]/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function checkQuizAnswer(userAnswer, backText) {
      const latinName = getLatinName(backText);
      const commonName = getCommonName(backText);

      const cleanedUser = normalize(userAnswer);
      const cleanedLatin = normalize(latinName);
      const cleanedCommon = normalize(commonName);

      if (cleanedUser === cleanedLatin) {
        return {
          isCorrect: true,
          note: "Correct full botanical name"
        };
      }

      if (cleanedCommon && cleanedUser === cleanedCommon) {
        return {
          isCorrect: false,
          note: "Common name recognised, but no mark"
        };
      }

      return {
        isCorrect: false,
        note: ""
      };
    }

    function startQuiz() {
      const currentCards = getCurrentCards();
      const previousIds = getStoredLastQuizIds();

      const unseenFirst = currentCards.filter(card => !previousIds.includes(card.id));
      const recentLast = currentCards.filter(card => previousIds.includes(card.id));

      const orderedPool = [
        ...shuffleArray(unseenFirst),
        ...shuffleArray(recentLast)
      ];

      quizCards = orderedPool.slice(0, Math.min(QUIZ_SIZE, orderedPool.length));
      quizAnswers = new Array(quizCards.length).fill("");
      currentQuizIndex = 0;
      showingResults = false;
      mode = "quiz";

      setStoredLastQuizIds(quizCards.map(card => card.id));

      updateModeButtons();
      renderApp();
    }

    function shuffleStudyDeck() {
      activeCards = shuffleArray(activeCards);
      currentIndex = 0;
      showingAnswer = false;
      mode = "study";
      showingResults = false;
      updateModeButtons();
      renderApp();
    }

    function nextQuizQuestion() {
      if (currentQuizIndex < quizCards.length - 1) {
        currentQuizIndex++;
        renderApp();
      }
    }

    function prevQuizQuestion() {
      if (currentQuizIndex > 0) {
        currentQuizIndex--;
        renderApp();
      }
    }

    function submitQuiz() {
      showingResults = true;
      renderApp();
    }

    function toggleAnswer() {
      showingAnswer = !showingAnswer;
      renderApp();
    }

    function prevCard() {
      if (currentIndex > 0) {
        currentIndex--;
        showingAnswer = false;
        renderApp();
      }
    }

    function nextCard() {
      const currentCards = getCurrentCards();
      if (currentIndex < currentCards.length - 1) {
        currentIndex++;
        showingAnswer = false;
        renderApp();
      }
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function attachStudyCardInteractions() {
      const flashcard = document.getElementById("flashcard");
      if (!flashcard) return;

      flashcard.addEventListener("click", function() {
        if (suppressCardClick) {
          suppressCardClick = false;
          return;
        }
        toggleAnswer();
      });

      flashcard.addEventListener("touchstart", function(e) {
        const touch = e.changedTouches[0];
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
      }, { passive: true });

      flashcard.addEventListener("touchend", function(e) {
        const touch = e.changedTouches[0];
        const dx = touch.clientX - touchStartX;
        const dy = touch.clientY - touchStartY;

        const absDx = Math.abs(dx);
        const absDy = Math.abs(dy);

        if (absDx > 50 && absDx > absDy) {
          suppressCardClick = true;
          if (dx < 0) {
            nextCard();
          } else {
            prevCard();
          }
        }
      }, { passive: true });
    }

    function renderApp() {
      if (mode === "study") {
        renderStudyMode();
      } else {
        renderQuizMode();
      }

      updateMobileStudyControls();
    }

    document.addEventListener("keydown", function(e) {
      if (mode !== "study") return;
      if (e.code === "Space") {
        const tag = document.activeElement?.tagName;
        if (tag === "INPUT" || tag === "TEXTAREA") return;
        e.preventDefault();
        toggleAnswer();
      }
      if (e.key === "ArrowRight") {
        nextCard();
      }
      if (e.key === "ArrowLeft") {
        prevCard();
      }
    });

    window.addEventListener("resize", updateMobileStudyControls);

    updateModeButtons();
    renderApp();
  </script>
</body>
</html>
